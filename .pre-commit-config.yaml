repos:
  - repo: local
    hooks:
      - id: black
        name: black
        entry: black
        language: system
        types: [python]
        args: [--line-length=100, --exclude=./venv]

      - id: tests
        name: Run tests
        entry: "bash ./.git/hooks/tests.sh"
        language: system
        # verbose: true
